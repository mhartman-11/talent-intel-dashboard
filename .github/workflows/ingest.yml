name: Ingest + Build + Deploy

on:
  schedule:
    # High-velocity sources: every 6 hours
    - cron: "0 */6 * * *"
    # Macro sources: daily at 09:00 UTC
    - cron: "0 9 * * *"
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch but don't write files)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write  # needed to commit data files back to repo

jobs:
  ingest-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Run ingest
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python -m ingest.run $DRY_RUN_FLAG

      - name: Commit updated data
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "talent-intel-bot"
          git config user.email "bot@hartmanai.com"
          git add public/data/
          # Only commit if there are staged changes
          git diff --cached --quiet || git commit -m "chore: ingest data update [$(date -u '+%Y-%m-%dT%H:%M')]" --no-verify
          git push || true

      - name: Set up Node
        if: github.event.inputs.dry_run != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Node deps
        if: github.event.inputs.dry_run != 'true'
        run: npm ci

      - name: Build Next.js static export
        if: github.event.inputs.dry_run != 'true'
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Pages
        if: github.event.inputs.dry_run != 'true'
        run: npx wrangler pages deploy out --project-name=talent-intel-dashboard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
